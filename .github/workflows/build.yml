name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-26
    permissions:
      contents: read
      actions: write

    steps:
    - name: Setup MAUI build environment
      uses: ./.github/actions/setup-maui

    - name: Build iOS
      run: dotnet build src/HihaArvio/HihaArvio.csproj -f net10.0-ios -c Release /p:ArchiveOnBuild=false /p:EnableCodeSigning=false

    - name: Upload iOS build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ios-build
        path: |
          src/HihaArvio/bin/Release/net10.0-ios/**/*.app
          src/HihaArvio/bin/Release/net10.0-ios/**/*.ipa
        retention-days: 7

  build-maccatalyst:
    name: Build macOS Catalyst
    runs-on: macos-26
    permissions:
      contents: read
      actions: write

    steps:
    - name: Setup MAUI build environment
      uses: ./.github/actions/setup-maui

    - name: Build macOS Catalyst
      run: dotnet build src/HihaArvio/HihaArvio.csproj -f net10.0-maccatalyst -c Release /p:ArchiveOnBuild=false /p:EnableCodeSigning=false

    - name: Upload macOS build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: maccatalyst-build
        path: |
          src/HihaArvio/bin/Release/net10.0-maccatalyst/**/*.app
          src/HihaArvio/bin/Release/net10.0-maccatalyst/**/*.pkg
        retention-days: 7

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [build-ios, build-maccatalyst]
    if: always()
    permissions: {}

    steps:
    - name: Check build status
      run: |
        if [[ "${{ needs.build-ios.result }}" == "success" ]] && [[ "${{ needs.build-maccatalyst.result }}" == "success" ]]; then
          echo "All builds succeeded"
          exit 0
        else
          echo "One or more builds failed"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "macOS Catalyst: ${{ needs.build-maccatalyst.result }}"
          exit 1
        fi
