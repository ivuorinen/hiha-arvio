name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '9.0.x'

    - name: Restore workloads
      run: dotnet workload restore src/HihaArvio/HihaArvio.csproj

    - name: Build iOS
      run: dotnet build src/HihaArvio/HihaArvio.csproj -f net9.0-ios -c Release /p:ArchiveOnBuild=false /p:EnableCodeSigning=false

    - name: Upload iOS build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ios-build
        path: |
          src/HihaArvio/bin/Release/net9.0-ios/**/*.app
          src/HihaArvio/bin/Release/net9.0-ios/**/*.ipa
        retention-days: 7

  build-maccatalyst:
    name: Build macOS Catalyst
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '9.0.x'

    - name: Restore workloads
      run: dotnet workload restore src/HihaArvio/HihaArvio.csproj

    - name: Build macOS Catalyst
      run: dotnet build src/HihaArvio/HihaArvio.csproj -f net9.0-maccatalyst -c Release /p:ArchiveOnBuild=false /p:EnableCodeSigning=false

    - name: Upload macOS build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: maccatalyst-build
        path: |
          src/HihaArvio/bin/Release/net9.0-maccatalyst/**/*.app
          src/HihaArvio/bin/Release/net9.0-maccatalyst/**/*.pkg
        retention-days: 7

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [build-ios, build-maccatalyst]
    if: always()
    permissions: {}

    steps:
    - name: Check build status
      run: |
        if [[ "${{ needs.build-ios.result }}" == "success" ]] && [[ "${{ needs.build-maccatalyst.result }}" == "success" ]]; then
          echo "✅ All builds succeeded"
          exit 0
        else
          echo "❌ One or more builds failed"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "macOS Catalyst: ${{ needs.build-maccatalyst.result }}"
          exit 1
        fi
