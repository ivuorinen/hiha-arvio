name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-26
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup MAUI build environment
      uses: ./.github/actions/setup-maui

    - name: Get version
      id: get_version
      uses: ./.github/actions/get-version

    - name: Build iOS Release
      run: |
        dotnet publish src/HihaArvio/HihaArvio.csproj \
          -f net10.0-ios \
          -c Release \
          /p:ApplicationDisplayVersion=${{ steps.get_version.outputs.version }} \
          /p:ApplicationVersion=${{ github.run_number }} \
          /p:ArchiveOnBuild=false \
          /p:EnableCodeSigning=false

    - name: Create iOS artifact archive
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        cd src/HihaArvio/bin/Release/net10.0-ios
        APP_PATH=$(find . -name "*.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app bundle found"
          exit 1
        fi
        zip -r "HihaArvio-iOS-${VERSION}.zip" "$APP_PATH"
        mv "HihaArvio-iOS-${VERSION}.zip" "${{ github.workspace }}/"

    - name: Upload iOS artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ios-release
        path: HihaArvio-iOS-${{ steps.get_version.outputs.version }}.zip
        retention-days: 7

  build-maccatalyst:
    name: Build macOS
    runs-on: macos-26
    permissions:
      contents: read
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup MAUI build environment
      uses: ./.github/actions/setup-maui

    - name: Get version
      id: get_version
      uses: ./.github/actions/get-version

    - name: Build macOS Catalyst Release
      run: |
        dotnet publish src/HihaArvio/HihaArvio.csproj \
          -f net10.0-maccatalyst \
          -c Release \
          /p:ApplicationDisplayVersion=${{ steps.get_version.outputs.version }} \
          /p:ApplicationVersion=${{ github.run_number }} \
          /p:ArchiveOnBuild=false \
          /p:EnableCodeSigning=false

    - name: Create macOS artifact archive
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        cd src/HihaArvio/bin/Release/net10.0-maccatalyst
        APP_PATH=$(find . -name "*.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app bundle found"
          exit 1
        fi
        zip -r "HihaArvio-macOS-${VERSION}.zip" "$APP_PATH"
        mv "HihaArvio-macOS-${VERSION}.zip" "${{ github.workspace }}/"

    - name: Upload macOS artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: maccatalyst-release
        path: HihaArvio-macOS-${{ steps.get_version.outputs.version }}.zip
        retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-ios, build-maccatalyst]
    if: always() && needs.build-ios.result == 'success' && needs.build-maccatalyst.result == 'success'
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Get version
      id: get_version
      uses: ./.github/actions/get-version

    - name: Generate changelog
      id: changelog
      env:
        EVENT_NAME: ${{ github.event_name }}
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
          echo "changelog=Manual release of version $VERSION" >> "$GITHUB_OUTPUT"
        else
          PREVIOUS_TAG=""
          for tag in $(git tag --sort=-creatordate); do
            if [ "$tag" != "v$VERSION" ] && git merge-base --is-ancestor "$tag" HEAD 2>/dev/null; then
              PREVIOUS_TAG="$tag"
              break
            fi
          done
          if [[ -z "$PREVIOUS_TAG" ]]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Download iOS artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ios-release

    - name: Download macOS artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: maccatalyst-release

    - name: Create Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          ## HihaArvio v${{ steps.get_version.outputs.version }}

          Sleeve Estimate - A playful Finnish take on agile estimation through shake gestures.

          ### Changes
          ${{ steps.changelog.outputs.changelog }}

          ### Supported Platforms
          - iOS 15.0+
          - macOS 12.0+ (via Mac Catalyst)

          ### Installation
          - **iOS**: Download the `.zip` file, extract, and install via Xcode or TestFlight
          - **macOS**: Download the `.zip` file, extract, and move to Applications folder
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
        files: |
          HihaArvio-iOS-${{ steps.get_version.outputs.version }}.zip
          HihaArvio-macOS-${{ steps.get_version.outputs.version }}.zip

  publish-status:
    name: Publish Status
    runs-on: ubuntu-latest
    needs: [build-ios, build-maccatalyst, create-release]
    if: always()
    permissions: {}

    steps:
    - name: Check publish status
      env:
        IOS_RESULT: ${{ needs.build-ios.result }}
        MAC_RESULT: ${{ needs.build-maccatalyst.result }}
        RELEASE_RESULT: ${{ needs.create-release.result }}
      run: |
        {
          echo "## Release Summary"
          echo ""
          echo "### Build Status"
          echo "- iOS: $IOS_RESULT"
          echo "- macOS Catalyst: $MAC_RESULT"
          echo "- Release: $RELEASE_RESULT"
        } >> "$GITHUB_STEP_SUMMARY"

        if [[ "$IOS_RESULT" == "success" ]] && [[ "$MAC_RESULT" == "success" ]] && [[ "$RELEASE_RESULT" == "success" ]]; then
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All builds succeeded and artifacts published" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        else
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "One or more steps failed" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
